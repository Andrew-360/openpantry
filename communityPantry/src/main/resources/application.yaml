spring:
  application:
    name: communityPantry

  profiles:
    active: local
  datasource:
    url: jdbc:h2:mem:communityPantry
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

# JWT configuration
jwt:
  secret: ${jwt.secret}
  expiration: 86400000